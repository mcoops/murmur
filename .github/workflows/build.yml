name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

      - name: Cache models
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/cache@v4
        with:
          path: target/release/models
          key: models-linux-ort1242-llama9553-qwen317b

      - name: Download models
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./target/release/murmur --download-models

      - name: Package release bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist/murmur-linux
          cp target/release/murmur dist/murmur-linux/
          cp -r target/release/models dist/murmur-linux/
          cd dist && zip -r murmur-linux-x86_64.zip murmur-linux/

      - uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: murmur-linux
          path: target/release/murmur

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: murmur-linux
          path: dist/murmur-linux-x86_64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Cache key includes 'mt-v1' so any change to CRT strategy busts the cache.
      # whisper-rs-sys must be rebuilt from scratch when CRT flags change.
      - uses: Swatinem/rust-cache@v2
        with:
          key: mt-v3

      # whisper-rs-sys builds whisper.cpp from source via cmake (defaults to /MD).
      # sherpa-onnx-sys ships prebuilt /MT static libs.
      # Toolchain files run before compiler detection, so if(MSVC) is always false
      # and string(REPLACE) on flag vars does nothing (vars are empty at that point).
      # Instead: set the flag vars directly with CACHE FORCE, and also set
      # CMAKE_MSVC_RUNTIME_LIBRARY (CMake 3.15+ canonical way, requires CMP0091 NEW).
      - name: Create cmake toolchain (/MT for whisper.cpp)
        run: |
          @'
          cmake_policy(SET CMP0091 NEW)
          set(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreaded" CACHE STRING "" FORCE)
          set(CMAKE_C_FLAGS_RELEASE        "/MT /O2 /Ob2 /DNDEBUG"       CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS_RELEASE      "/MT /O2 /Ob2 /DNDEBUG"       CACHE STRING "" FORCE)
          set(CMAKE_C_FLAGS_RELWITHDEBINFO   "/MT /O2 /Ob1 /DNDEBUG /Zi" CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS_RELWITHDEBINFO "/MT /O2 /Ob1 /DNDEBUG /Zi" CACHE STRING "" FORCE)
          '@ | Out-File -FilePath toolchain.cmake -Encoding utf8

      - name: Build
        run: cargo build --release
        env:
          CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/toolchain.cmake

      - name: Cache models
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/cache@v4
        with:
          path: target/release/models
          key: models-windows-ort1242-llama9553-qwen317b

      - name: Download models
        if: startsWith(github.ref, 'refs/tags/v')
        run: .\target\release\murmur.exe --download-models

      - name: Package release bundle
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\murmur-windows -Force
          Copy-Item target\release\murmur.exe dist\murmur-windows\
          Copy-Item -Recurse target\release\models dist\murmur-windows\models
          Compress-Archive -Path dist\murmur-windows\* -DestinationPath dist\murmur-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/v')"
        with:
          name: murmur-windows
          path: target/release/murmur.exe

      - uses: actions/upload-artifact@v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: murmur-windows
          path: dist/murmur-windows-x86_64.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: murmur-linux
          path: artifacts/
      - uses: actions/download-artifact@v4
        with:
          name: murmur-windows
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/murmur-linux-x86_64.zip
            artifacts/murmur-windows-x86_64.zip
          generate_release_notes: true
