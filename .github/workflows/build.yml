name: Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Vulkan dependencies
        run: sudo apt-get install -y libvulkan-dev glslc
      - run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: murmur-linux
          path: target/release/murmur

  build-windows:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: C:\b
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      # Cache key includes 'mt-v1' so any change to CRT strategy busts the cache.
      # whisper-rs-sys must be rebuilt from scratch when CRT flags change.
      - uses: Swatinem/rust-cache@v2
        with:
          key: mt-v3

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          install_runtime: false

      # whisper-rs-sys builds whisper.cpp from source via cmake (defaults to /MD).
      # sherpa-onnx-sys ships prebuilt /MT static libs.
      # Toolchain files run before compiler detection, so if(MSVC) is always false
      # and string(REPLACE) on flag vars does nothing (vars are empty at that point).
      # Instead: set the flag vars directly with CACHE FORCE, and also set
      # CMAKE_MSVC_RUNTIME_LIBRARY (CMake 3.15+ canonical way, requires CMP0091 NEW).
      - name: Create cmake toolchain (/MT for whisper.cpp)
        run: |
          @'
          cmake_policy(SET CMP0091 NEW)
          set(CMAKE_MSVC_RUNTIME_LIBRARY "MultiThreaded" CACHE STRING "" FORCE)
          set(CMAKE_C_FLAGS_RELEASE        "/MT /O2 /Ob2 /DNDEBUG"       CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS_RELEASE      "/MT /O2 /Ob2 /DNDEBUG"       CACHE STRING "" FORCE)
          set(CMAKE_C_FLAGS_RELWITHDEBINFO   "/MT /O2 /Ob1 /DNDEBUG /Zi" CACHE STRING "" FORCE)
          set(CMAKE_CXX_FLAGS_RELWITHDEBINFO "/MT /O2 /Ob1 /DNDEBUG /Zi" CACHE STRING "" FORCE)
          '@ | Out-File -FilePath toolchain.cmake -Encoding utf8

      - name: Build
        run: cargo build --release
        env:
          CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/toolchain.cmake

      - uses: actions/upload-artifact@v4
        with:
          name: murmur-windows
          path: C:\b\release\murmur.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: murmur-linux
          path: artifacts/linux/
      - uses: actions/download-artifact@v4
        with:
          name: murmur-windows
          path: artifacts/windows/
      - name: Package
        run: |
          chmod +x artifacts/linux/murmur
          zip -j artifacts/murmur-linux-x86_64.zip artifacts/linux/murmur
          zip -j artifacts/murmur-windows-x86_64.zip artifacts/windows/murmur.exe
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/murmur-linux-x86_64.zip
            artifacts/murmur-windows-x86_64.zip
          generate_release_notes: true
